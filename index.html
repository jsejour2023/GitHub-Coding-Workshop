<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yoshi's JavaScript Adventure</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div id="hud">
            <div>LEVEL: <span id="level-num">1</span></div>
            <div>SCORE: <span id="score-num">0</span></div>
        </div>
        
        <canvas id="gameCanvas" width="800" height="400"></canvas>

        <div id="overlay">
            <h1 id="status-text">GAME OVER</h1>
            <p>Press <strong>R</strong> to Restart Level</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
